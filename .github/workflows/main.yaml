name: main
on: [push, pull_request]

jobs:
  check:
    strategy:
      matrix:
        deno-version: [v2.3.x, v2.x]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ matrix.deno-version }}
    - run: deno install
    - run: deno task check
    - run: |
        set -ex
        [[ "$(jq -r .version deno.json)" = "$(jq -r .version package.json)" ]]

  runtime:
    strategy:
      matrix:
        include:
        - runtime: node
          os: ubuntu-latest
        - runtime: node
          os: windows-latest
        - runtime: bun
          os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - if: matrix.runtime == 'node'
      uses: actions/setup-node@v6
      with:
        node-version: 20
        package-manager-cache: false
    - if: matrix.runtime == 'bun'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.0
    - uses: pnpm/action-setup@v4
      with:
        version: "10.34.5"
        run_install: true
    - if: matrix.runtime == 'node'
      run: pnpm run test:node
    - if: matrix.runtime == 'bun'
      run: pnpm run test:bun
    - run: pnpm run build
    - if: matrix.runtime == 'node'
      run: node --input-type=module --eval "import { SERVICES } from './dist/index.js'; if (!SERVICES['serveo.net'].knownHosts) throw new Error('Missing built-in host keys');"
    - if: matrix.runtime == 'node'
      run: node --eval "const { SERVICES } = require('./dist/index.cjs'); if (!SERVICES['serveo.net'].knownHosts) throw new Error('Missing built-in host keys');"
    - if: matrix.runtime == 'bun'
      run: bun --eval "import { SERVICES } from './dist/index.js'; if (!SERVICES['serveo.net'].knownHosts) throw new Error('Missing built-in host keys');"

  publish:
    needs: [check, runtime]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
        package-manager-cache: false
    - uses: pnpm/action-setup@v4
      with:
        version: "10.34.5"
        run_install: true
    - run: deno install
    - if: github.ref_type == 'branch'
      run: |
        jq \
          --arg build "$GITHUB_RUN_NUMBER" \
          --arg commit "${GITHUB_SHA::8}" \
          '.version = .version + "-dev." + $build + "+" + $commit' \
          deno.json > deno.json.tmp
        mv deno.json.tmp deno.json
        jq \
          --arg build "$GITHUB_RUN_NUMBER" \
          '.version = .version + "-dev." + $build' \
          package.json > package.json.tmp
        mv package.json.tmp package.json
    - if: github.ref_type == 'tag'
      run: |
        set -ex
        [[ "$(jq -r .version deno.json)" = "$GITHUB_REF_NAME" ]]
        [[ "$(jq -r .version package.json)" = "$GITHUB_REF_NAME" ]]
    - if: github.event_name == 'pull_request'
      run: |
        deno publish --dry-run --allow-dirty
        npm publish --access public --dry-run
    - if: github.event_name == 'push'
      run: |
        deno publish --allow-dirty
        if [[ "$GITHUB_REF_TYPE" = "tag" ]]; then
          npm publish --access public
        else
          npm publish --access public --tag dev
        fi
